name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build & test
        run: swift test
      - name: Build universal app + zip
        run: ./scripts/release.sh "${GITHUB_REF_NAME#v}"
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AirTracker-*-macos-universal.zip
          generate_release_notes: true
