<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AirTracker — Live Viewer</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #0b0e14; color: #e6e9ef;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #scene { position: fixed; inset: 0; }
  #hud { position: fixed; top: 16px; left: 16px; padding: 14px 16px;
    background: rgba(18,22,32,.82); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.08); border-radius: 12px; min-width: 210px; }
  #hud h1 { margin: 0 0 10px; font-size: 15px; letter-spacing: .3px; }
  .row { display: flex; justify-content: space-between; gap: 18px; padding: 2px 0; }
  .row .k { color: #8b93a7; }
  .row .v { font-variant-numeric: tabular-nums; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    background: #565f73; margin-right: 7px; vertical-align: middle; }
  .dot.on { background: #34d399; box-shadow: 0 0 8px #34d399aa; }
  button { margin-top: 12px; width: 100%; padding: 8px 12px; cursor: pointer;
    background: #2563eb; color: #fff; border: 0; border-radius: 8px; font-size: 14px; }
  button:hover { background: #1d4ed8; }
  #hint { position: fixed; bottom: 14px; left: 16px; color: #6b7280; font-size: 12px; }
</style>
</head>
<body>
<div id="scene"></div>
<div id="hud">
  <h1>AirTracker</h1>
  <div class="row"><span class="k"><span id="dot" class="dot"></span>Status</span><span class="v" id="status">connecting…</span></div>
  <div class="row"><span class="k">Rate</span><span class="v"><span id="pps">0</span> Hz</span></div>
  <div class="row"><span class="k">Yaw</span><span class="v" id="yaw">0.0°</span></div>
  <div class="row"><span class="k">Pitch</span><span class="v" id="pitch">0.0°</span></div>
  <div class="row"><span class="k">Roll</span><span class="v" id="roll">0.0°</span></div>
  <button id="recenter">Recenter</button>
</div>
<div id="hint">Green axis = up · Blue = forward (nose) · Red = right</div>

<script type="importmap">
{ "imports": { "three": "/vendor/three.module.min.js" } }
</script>
<script type="module">
import * as THREE from "three";

const mount = document.getElementById("scene");
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0e14);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.set(2.4, 1.6, 3.2);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
mount.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x223044, 1.1));
const key = new THREE.DirectionalLight(0xffffff, 1.4);
key.position.set(3, 5, 4);
scene.add(key);

const grid = new THREE.GridHelper(10, 20, 0x1f2937, 0x161c26);
grid.position.y = -1.2;
scene.add(grid);

// Head rig. Local axes: +X right, +Y up, +Z forward (nose). The incoming
// quaternion is remapped from CoreMotion (x=right, y=forward, z=up) below.
const head = new THREE.Group();
scene.add(head);

const skin = new THREE.MeshStandardMaterial({ color: 0x9aa7bd, roughness: 0.6, metalness: 0.05 });
const face = new THREE.Mesh(new THREE.BoxGeometry(1.05, 1.3, 1.25), skin);
head.add(face);

const nose = new THREE.Mesh(
  new THREE.ConeGeometry(0.22, 0.5, 24),
  new THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.4 })
);
nose.rotation.x = Math.PI / 2;   // point cone along +Z
nose.position.set(0, -0.05, 0.75);
head.add(nose);

const eyeMat = new THREE.MeshStandardMaterial({ color: 0x11151d });
for (const dx of [-0.26, 0.26]) {
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 20, 20), eyeMat);
  eye.position.set(dx, 0.18, 0.63);
  head.add(eye);
}
head.add(new THREE.AxesHelper(1.1));

function onResize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}
addEventListener("resize", onResize);

const q = new THREE.Quaternion();
function render() {
  head.quaternion.slerp(q, 0.4);
  renderer.render(scene, camera);
  requestAnimationFrame(render);
}
render();

// WebSocket link.
const dot = document.getElementById("dot");
const statusEl = document.getElementById("status");
const el = (id) => document.getElementById(id);
let ws;

function connect() {
  ws = new WebSocket(`ws://${location.hostname}:__WS_PORT__`);
  ws.onopen = () => { statusEl.textContent = "streaming"; dot.classList.add("on"); };
  ws.onclose = () => {
    statusEl.textContent = "reconnecting…"; dot.classList.remove("on");
    setTimeout(connect, 1000);
  };
  ws.onmessage = (ev) => {
    let d; try { d = JSON.parse(ev.data); } catch { return; }
    const [w, x, y, z] = d.quaternion;
    // CoreMotion (x=right, y=forward, z=up) -> three (x=right, y=up, z=forward)
    q.set(x, z, y, w);
    const [yaw, pitch, roll] = d.yprDegrees;
    el("yaw").textContent = yaw.toFixed(1) + "°";
    el("pitch").textContent = pitch.toFixed(1) + "°";
    el("roll").textContent = roll.toFixed(1) + "°";
    el("pps").textContent = d.packetsPerSecond;
  };
}
connect();

document.getElementById("recenter").onclick = () => {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ cmd: "recenter" }));
};
</script>
</body>
</html>
